</head>

function vert(i){
  i=(i||'').toLowerCase();
  if(/fintech|financial|crypto|insurance/.test(i))return'fintech';
  if(/(streaming|television|broadcasting|media)/.test(i)&&!/personal/.test(i))return'streaming';
  if(/personal care|beauty|cosmetics/.test(i))return'beauty';
  return'other';
}

function parseRows(rows){
  const events=[];
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    const name=(row[2]||'').trim();
    if(!name)continue;
    events.push({
      m:(row[0]||'').trim(), l:(row[1]||'').trim(), n:name,
      i:(row[3]||'').trim(), t:(row[4]||'').trim(), d:(row[5]||'').trim(),
      w:(row[6]||'').trim(), p:(row[7]||'').trim(), a:(row[8]||'').trim(),
      days:parseFloat(row[9])||null, _v:vert((row[3]||'').trim())
    });
  }
  return sortEvents(events);
}

function parseFallback(data){
  return sortEvents(data.map(e=>({...e, _v:vert(e.i)})));
}

function sortEvents(events){
  events.sort((a,b)=>{
    const ai=MO.indexOf(a.m),bi=MO.indexOf(b.m);
    if(ai!==bi)return(ai===-1?99:ai)-(bi===-1?99:bi);
    const po={High:0,Medium:1,Low:2};
    return(po[a.p]??3)-(po[b.p]??3);
  });
  return events;
}

async function loadLive(){
  // Method 1: Papa Parse download
  try {
    const result = await new Promise((resolve, reject) => {
      Papa.parse(CSV_URL, {
        download: true, header: false, skipEmptyLines: true,
        complete: r => resolve(r),
        error: e => reject(e)
      });
    });
    if(result.data && result.data.length>1){
      return {events: parseRows(result.data.slice(1)), source:'live-papa'};
    }
  } catch(e){ console.log('Papa Parse failed:', e); }

  // Method 2: fetch API directly
  try {
    const res = await fetch(CSV_URL);
    if(res.ok){
      const text = await res.text();
      const result = Papa.parse(text, {header:false, skipEmptyLines:true});
      if(result.data && result.data.length>1){
        return {events: parseRows(result.data.slice(1)), source:'live-fetch'};
      }
    }
  } catch(e){ console.log('Fetch failed:', e); }

  // Method 3: fetch with no-cors (will fail but try)
  try {
    const res = await fetch(CSV_URL, {mode:'cors', credentials:'omit'});
    if(res.ok){
      const text = await res.text();
      const result = Papa.parse(text, {header:false, skipEmptyLines:true});
      if(result.data && result.data.length>1){
        return {events: parseRows(result.data.slice(1)), source:'live-cors'};
      }
    }
  } catch(e){ console.log('CORS fetch failed:', e); }

  return null;
}

let E=[], fv='all', fp='all';

function renderStats(){
  const st=document.getElementById('stats');
  const hc=E.filter(e=>e.p==='High').length;
  const mc=E.filter(e=>e.p==='Medium').length;
  const fc=E.filter(e=>e._v==='fintech').length;
  const sc=E.filter(e=>e._v==='streaming').length;
  const bc=E.filter(e=>e._v==='beauty').length;
  st.innerHTML=`
    <div class="sc"><div class="n">${E.length}</div><div class="lb">Total Events</div></div>
    <div class="sc"><div class="n">${hc}</div><div class="lb">High Priority</div></div>
    <div class="sc"><div class="n">${mc}</div><div class="lb">Medium Priority</div></div>
    <div class="sc"><div class="n">${fc}</div><div class="lb">Fintech</div></div>
    <div class="sc"><div class="n">${sc}</div><div class="lb">Streaming/TV</div></div>
    <div class="sc"><div class="n">${bc}</div><div class="lb">Beauty</div></div>`;
}

function render(){
  const f=E.filter(e=>{
    if(fv!=='all'&&e._v!==fv)return false;
    if(fp!=='all'&&e.p!==fp)return false;
    return true;
  });
  const g=document.getElementById('grid');
  document.getElementById('count').textContent=f.length+' events';
  g.innerHTML='';
  let cm='';
  f.forEach(e=>{
    if(e.m!==cm){cm=e.m;const s=document.createElement('div');s.className='st';s.textContent=cm||'TBD';g.appendChild(s)}
    const c=document.createElement('div');
    const pc=e.p==='High'?'h':e.p==='Medium'?'m':'l';
    c.className='ec '+pc;
    const bc2=e.p==='High'?'bdg-h':e.p==='Medium'?'bdg-m':'bdg-l';
    const vc='vt-'+e._v;
    const at=e.a==='Yes'?' ✅':'';
    c.innerHTML=`<div>
      <div class="en">${e.n}${at}</div>
      <div class="em">
        <span>📅 ${e.m||'TBD'}</span><span>📍 ${e.l}</span>
        ${e.days?'<span>⏱ '+e.days+'d</span>':''}<span>🏷 ${e.t||''}</span>
      </div>
      <div class="ed">${e.d}</div>
    </div>
    <div class="sd">
      <span class="bdg ${bc2}">${e.p||'TBD'}</span>
      <span class="vt ${vc}">${e.i||''}</span>
    </div>`;
    c.onclick=()=>c.classList.toggle('open');
    g.appendChild(c);
  });
}

function wireFilters(){
  document.getElementById('controls').style.display='block';
  document.getElementById('vertFilters').onclick=e=>{
    if(!e.target.classList.contains('fb'))return;
    document.querySelectorAll('#vertFilters .fb').forEach(b=>b.classList.remove('act'));
    e.target.classList.add('act'); fv=e.target.dataset.v; render();
  };
  document.getElementById('prioFilters').onclick=e=>{
    if(!e.target.classList.contains('fb'))return;
    document.querySelectorAll('#prioFilters .fb').forEach(b=>b.classList.remove('act'));
    e.target.classList.add('act'); fp=e.target.dataset.p; render();
  };
}

// Init — try live, fall back to embedded snapshot
(async function(){
  const note=document.getElementById('srcNote');
  const live=await loadLive();
  if(live && live.events.length>0){
    E=live.events;
    note.innerHTML=`<span class="dot dot-live"></span> Live from Google Sheets (${live.source}) · ${E.length} events · ${new Date().toLocaleString()}`;
  } else {
    E=parseFallback(FALLBACK);
    note.innerHTML=`<span class="dot dot-cache"></span> Using embedded snapshot · ${E.length} events · To enable live sync, host this file on a web server (not file://) and ensure the sheet is <a href="https://support.google.com/docs/answer/183965" target="_blank" style="color:var(--gold)">published to web</a>`;
  }
  renderStats(); render(); wireFilters();
})();
</script>
